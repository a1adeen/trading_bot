<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>HedgePilot • live algo dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f7fb;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 1.5rem; color: #1e293b;
    }
    .dashboard {
      max-width: 780px; width: 100%; background: #ffffff;
      box-shadow: 0 20px 35px rgba(0,0,0,0.03), 0 8px 18px rgba(0,0,0,0.05);
      border-radius: 2.5rem; padding: 2rem 2rem 2.2rem;
      border: 1px solid rgba(0,0,0,0.04);
    }
    h1 { font-size: 1.7rem; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 0.1rem; color: #0f172a; }
    .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 2rem; }
    .search-container { display: flex; gap: 0.75rem; margin-bottom: 2.4rem; align-items: center; }
    .search-box {
      flex: 1; display: flex; align-items: center; background: #ffffff;
      border: 1px solid #e2e8f0; border-radius: 2.5rem; padding: 0.2rem 0.2rem 0.2rem 1.2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .search-box:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .search-box i { color: #94a3b8; font-size: 0.95rem; }
    .search-box input {
      width: 100%; border: none; padding: 0.75rem 0.5rem; font-size: 0.95rem;
      background: transparent; outline: none; font-weight: 500; color: #0f172a;
    }
    .search-box input::placeholder { color: #94a3b8; font-weight: 400; }
    button {
      background: #1e293b; color: white; border: none; border-radius: 2.5rem;
      padding: 0.8rem 1.6rem; font-weight: 500; font-size: 0.9rem;
      display: flex; align-items: center; gap: 0.4rem; cursor: pointer;
      transition: 0.2s; border: 1px solid #1e293b; white-space: nowrap;
    }
    button:hover { background: #0f172a; box-shadow: 0 6px 14px rgba(15,23,42,0.1); }
    .analysis-card {
      background: #f9fafb; border-radius: 1.8rem; padding: 1.5rem 1.6rem;
      margin-bottom: 2rem; border: 1px solid #edf2f7; display: flex;
      flex-wrap: wrap; align-items: center; justify-content: space-between;
    }
    .stock-info { display: flex; align-items: center; gap: 1rem; }
    .ticker-icon {
      background: #1e293b; color: white; font-weight: 700; font-size: 1.1rem;
      width: 48px; height: 48px; display: flex; align-items: center;
      justify-content: center; border-radius: 1.2rem;
    }
    .details h3 { font-size: 1.4rem; font-weight: 600; color: #0f172a; }
    .details .company { font-size: 0.85rem; color: #475569; margin-top: 0.1rem; }
    .strategy-verdict {
      display: flex; align-items: center; gap: 0.7rem; background: white;
      padding: 0.6rem 1.4rem; border-radius: 2.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid #e9eef3; font-weight: 500;
    }
    .badge { font-weight: 600; padding: 0.25rem 0.9rem; border-radius: 2rem; font-size: 0.8rem; }
    .badge.buy { background: #dcfce7; color: #166534; }
    .badge.sell { background: #fee2e2; color: #991b1b; }
    .badge.hold { background: #fef9c3; color: #854d0e; }
    .signal-text { font-size: 0.9rem; color: #334155; }
    .portfolio-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .portfolio-header h2 { font-size: 1.2rem; font-weight: 600; color: #1e293b; }
    .ai-tag { background: #ede9fe; color: #5b21b6; font-size: 0.7rem; padding: 0.2rem 0.7rem; border-radius: 1rem; font-weight: 600; }
    .portfolio-list { display: flex; flex-direction: column; gap: 0.7rem; max-height: 260px; overflow-y: auto; padding-right: 0.2rem; }
    .portfolio-item {
      display: flex; align-items: center; justify-content: space-between;
      background: white; padding: 0.9rem 1.2rem; border-radius: 1.2rem;
      border: 1px solid #f1f5f9;
    }
    .portfolio-left { display: flex; align-items: center; gap: 0.9rem; }
    .ticker-small { font-weight: 700; background: #f1f5f9; padding: 0.35rem 0.7rem; border-radius: 0.7rem; font-size: 0.8rem; }
    .trade-action { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 500; }
    .action-buy { color: #059669; background: #d1fae5; padding: 0.2rem 0.7rem; border-radius: 1rem; }
    .action-sell { color: #b91c1c; background: #fee2e2; padding: 0.2rem 0.7rem; border-radius: 1rem; }
    .ai-detected { font-size: 0.7rem; color: #6366f1; display: flex; align-items: center; gap: 0.2rem; }
    hr { border: 0.5px solid #e9eef3; margin: 1.5rem 0 1.2rem; }
    .footer-note { font-size: 0.75rem; color: #64748b; display: flex; justify-content: flex-end; align-items: center; gap: 0.3rem; }
    @media (max-width: 500px) { .dashboard { padding: 1.5rem; } .analysis-card { flex-direction: column; align-items: flex-start; gap: 1rem; } }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>⚡ HedgePilot <span style="font-size:0.9rem;font-weight:400;color:#475569;">live</span></h1>
    <div class="subtitle"><i class="fas fa-chart-line"></i> Connected to your Python algo</div>

    <div class="search-container">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="stockInput" placeholder="Search ticker (AAPL, TSLA...)" autocomplete="off" />
      </div>
      <button id="analyzeBtn"><i class="fas fa-flask"></i> Check strategy</button>
    </div>

    <div id="analysisResult" class="analysis-card" style="display: none;"></div>
    <div id="analysisPlaceholder" style="margin-bottom:1.8rem;color:#94a3b8;font-size:0.9rem;display:flex;align-items:center;gap:0.5rem;background:#f8fafc;padding:1rem 1.3rem;border-radius:1.2rem;">
      <i class="fas fa-info-circle"></i> Enter a symbol to validate against your strategy.
    </div>

    <hr>

    <div class="portfolio-header">
      <h2><i class="fas fa-robot" style="color:#4f46e5;"></i> AI‑detected trades</h2>
      <span class="ai-tag"><i class="fas fa-microchip"></i> live from bot</span>
    </div>
    <div id="portfolioContainer">
      <div class="portfolio-list" id="portfolioList"></div>
    </div>
    <div class="footer-note"><i class="far fa-clock"></i> auto‑refresh • your algo at work</div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    const analysisResultDiv = document.getElementById('analysisResult');
    const analysisPlaceholder = document.getElementById('analysisPlaceholder');
    const portfolioListDiv = document.getElementById('portfolioList');
    const stockInput = document.getElementById('stockInput');
    const analyzeBtn = document.getElementById('analyzeBtn');

    async function fetchPortfolio() {
      try {
        const res = await fetch(`${API_BASE}/portfolio`);
        if (!res.ok) throw new Error('Portfolio fetch failed');
        const data = await res.json();
        renderPortfolio(data.portfolio || []);
      } catch (err) {
        portfolioListDiv.innerHTML = `<div class="empty-portfolio" style="color:#b91c1c;">⚠️ Could not load portfolio. Is server running?</div>`;
      }
    }

    function renderPortfolio(items) {
      if (!items.length) {
        portfolioListDiv.innerHTML = `<div class="empty-portfolio"><i class="far fa-folder-open"></i> No AI trades detected yet.</div>`;
        return;
      }
      let html = '';
      items.forEach(item => {
        const actionClass = item.action === 'BUY' ? 'action-buy' : 'action-sell';
        const confidenceIcon = item.ai_confidence === 'high' ? '🔵' : '🟡';
        html += `
          <div class="portfolio-item">
            <div class="portfolio-left">
              <span class="ticker-small">${item.ticker}</span>
              <span class="trade-action">
                <span class="${actionClass}">${item.action}</span>
                <span style="font-size:0.75rem;">${item.shares} sh</span>
              </span>
            </div>
            <div style="display:flex; align-items:center; gap:0.7rem;">
              <span style="font-weight:500;">$${item.price.toFixed(2)}</span>
              <span class="ai-detected"><i class="fas fa-brain"></i> ${confidenceIcon}</span>
            </div>
          </div>`;
      });
      portfolioListDiv.innerHTML = html;
    }

    async function checkStrategy(ticker) {
      if (!ticker) return displayError('Enter a ticker symbol.');
      try {
        const res = await fetch(`${API_BASE}/check?symbol=${encodeURIComponent(ticker.trim().toUpperCase())}`);
        const data = await res.json();
        if (data.error) {
          displayError(data.error);
        } else {
          displayAnalysis(data);
        }
      } catch (err) {
        displayError('Backend unreachable. Ensure server.py is running.');
      }
    }

    function displayAnalysis(data) {
      const { ticker, company, satisfies, signal, reason } = data;
      const badgeClass = signal.toLowerCase();
      const verdictIcon = satisfies ? '✅' : '❌';
      analysisResultDiv.style.display = 'flex';
      analysisResultDiv.innerHTML = `
        <div class="stock-info">
          <div class="ticker-icon">${ticker.substring(0,2)}</div>
          <div class="details">
            <h3>${ticker}</h3>
            <div class="company">${company}</div>
          </div>
        </div>
        <div class="strategy-verdict">
          <span class="badge ${badgeClass}">${signal}</span>
          <span class="signal-text">${verdictIcon} Strategy ${satisfies ? 'satisfied' : 'not satisfied'}</span>
          <span style="font-size:0.75rem;color:#64748b;">${reason}</span>
        </div>`;
      analysisPlaceholder.style.display = 'none';
    }

    function displayError(msg) {
      analysisResultDiv.style.display = 'flex';
      analysisResultDiv.innerHTML = `<div style="display:flex;align-items:center;gap:1rem;color:#b91c1c;"><i class="fas fa-exclamation-triangle"></i> ${msg}</div>`;
      analysisPlaceholder.style.display = 'none';
    }

    analyzeBtn.addEventListener('click', () => checkStrategy(stockInput.value));
    stockInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') analyzeBtn.click(); });

    // Click on portfolio ticker to auto‑search
    portfolioListDiv.addEventListener('click', (e) => {
      const item = e.target.closest('.portfolio-item');
      if (!item) return;
      const tickerSpan = item.querySelector('.ticker-small');
      if (tickerSpan) {
        stockInput.value = tickerSpan.textContent.trim();
        checkStrategy(stockInput.value);
      }
    });

    // Initial load
    fetchPortfolio();
    analysisPlaceholder.style.display = 'flex';
    analysisResultDiv.style.display = 'none';
  </script>
</body>
</html>
